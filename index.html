<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Burnout Test</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eef2f7;
}

/* HEADER */
.header {
    background: url("https://images.unsplash.com/photo-1492724441997-5dc865305da7");
    background-size: cover;
    background-position: center;
    padding: 70px 20px;
    text-align: center;
    color: white;
}

.header h1 {
    background: rgba(0,0,0,0.6);
    display: inline-block;
    padding: 15px 30px;
    border-radius: 12px;
}

/* CONTAINER */
.container {
    max-width: 800px;
    margin: -40px auto 40px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* PROGRESS BAR */
.progress {
    width: 100%;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}

.progress-bar {
    height: 10px;
    width: 0%;
    background: #4facfe;
    transition: 0.3s;
}

/* QUESTIONS */
.question {
    margin: 20px 0;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.5s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
}

label {
    display: block;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
}

label:hover {
    background: #f0f8ff;
}

button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(to right, #4facfe, #00c6ff);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="header">
    <h1>Burnout Self Assessment</h1>
</div>

<div class="container">

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<form id="quizForm">

<!-- الأسئلة -->
<script>
for (let i = 1; i <= 10; i++) {
    document.write(`
    <div class="question">
        <p>${i}. Question ${i}</p>
        <label><input type="radio" name="q${i}" value="0"> Never</label>
        <label><input type="radio" name="q${i}" value="1"> Sometimes</label>
        <label><input type="radio" name="q${i}" value="2"> Often</label>
        <label><input type="radio" name="q${i}" value="3"> Always</label>
    </div>
    `);
}
</script>

<button type="button" onclick="submitQuiz()">Submit</button>

</form>
</div>

<script>
let totalQuestions = 10;

document.addEventListener("change", updateProgress);

function updateProgress() {
    let answered = document.querySelectorAll("input[type=radio]:checked").length;
    let percent = (answered / totalQuestions) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
}

function submitQuiz() {
    let total = 0;

    for (let i = 1; i <= 10; i++) {
        let q = document.querySelector('input[name="q'+i+'"]:checked');
        if (!q) {
            alert("Please answer all questions!");
            return;
        }
        total += parseInt(q.value);
    }

    localStorage.setItem("score", total);
    window.location.href = "result.html";
}
</script>

</body>
</html>
